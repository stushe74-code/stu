<!DOCTYPE html>
<html>
<head>
    <title>NS2 Program Viewer</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .buttons{
            text-align: center;
            margin-bottom: 20px;
        }

        button{
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: green;
        }

        pre{
            background-color: white;
            border: 1px solid black;
            padding: 20px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

    </style>

</head>

<body>

    <h1>NS2 Program Viewer</h1>

    <div class="buttons">

        <button onclick="showProgram(1)">Program 1</button>
        <button onclick="showProgram(2)">Program 2</button>
        <button onclick="showProgram(3)">Program 3</button>
        <button onclick="showProgram(4)">Program 4</button>
        <button onclick="showProgram(5)">Program 5</button>

    </div>

    <pre id="output">
Click any button to display the program
    </pre>

<script>

const programs = {

1: `PROGRAM 1

set ns [new Simulator] 
set tracefile [open lab1.tr w] 
$ns trace-all $tracefile 

set namfile [open lab1.nam w] 
$ns namtrace-all $namfile 

proc finish {} { 
global ns tracefile namfile 

$ns flush-trace 

close $tracefile 
close $namfile 

exec nam lab1.nam & 

exit 0 
} 

set n0 [$ns node] 
set n1 [$ns node] 
set n2 [$ns node] 

$ns duplex-link $n0 $n1 10.0Mb 1ms DropTail 
$ns queue-limit $n0 $n1 10 

$ns duplex-link $n1 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n1 $n2 10 

set tcp0 [new Agent/TCP] 
$ns attach-agent $n0 $tcp0 

set sink2 [new Agent/TCP Sink] 
$ns attach-agent $n2 $sink2 

$ns connect $tcp0 $sink2 

set ftp0 [new Application/FTP] 
$ftp0 attach-agent $tcp0 

$ns at 1.0 "$ftp0 start" 
$ns at 10.0 "$ftp0 stop" 

$ns at 11.0 "finish" 

$ns run`,

2: `PROGRAM 2

set ns [new Simulator] 

set tracefile [open 2.tr w] 
$ns trace-all $tracefile 

set namfile [open 2.nam w] 
$ns namtrace-all $namfile 

proc finish {} { 

global ns tracefile namfile 

$ns flush-trace 

close $tracefile 
close $namfile 

exec nam 2.nam & 

exit 0 
} 

set n0 [$ns node] 
set n1 [$ns node] 
set n2 [$ns node] 
set n3 [$ns node] 

$ns duplex-link $n0 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n0 $n2 10 

$ns duplex-link $n1 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n1 $n2 10 

$ns duplex-link $n2 $n3 10.0Mb 1ms DropTail 
$ns queue-limit $n2 $n3 10 

set tcp0 [new Agent/TCP] 
$ns attach-agent $n0 $tcp0 

set sink3 [new Agent/TCP Sink] 
$ns attach-agent $n3 $sink3 

$ns connect $tcp0 $sink3 

set tcp1 [new Agent/TCP] 
$ns attach-agent $n1 $tcp1 

set sink31 [new Agent/TCP Sink] 
$ns attach-agent $n3 $sink31 

$ns connect $tcp1 $sink31 

set ftp0 [new Application/FTP] 
$ftp0 attach-agent $tcp0 

$ns at 1.0 "$ftp0 start" 
$ns at 10.0 "$ftp0 stop" 

set ftp1 [new Application/FTP] 
$ftp1 attach-agent $tcp1 

$ns at 1.0 "$ftp1 start" 
$ns at 10.0 "$ftp1 stop" 

$ns at 11.0 "finish" 

$ns run`,

3: `PROGRAM 3

set ns [new Simulator] 

set tracefile [open 3.tr w] 
$ns trace-all $tracefile 

set namfile [open 3.nam w] 
$ns namtrace-all $namfile 

proc finish {} { 

global ns tracefile namfile 

$ns flush-trace 

close $tracefile 
close $namfile 

exec nam 3.nam & 

exit 0 
} 

set n0 [$ns node] 
set n1 [$ns node] 
set n2 [$ns node] 
set n3 [$ns node] 

$ns duplex-link $n0 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n0 $n2 10 

$ns duplex-link $n1 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n1 $n2 10 

$ns duplex-link $n2 $n3 10.0Mb 1ms DropTail 
$ns queue-limit $n2 $n3 10 

set udp0 [new Agent/UDP] 
$ns attach-agent $n0 $udp0 

set null3 [new Agent/Null] 
$ns attach-agent $n3 $null3 

$ns connect $udp0 $null3 

set udp1 [new Agent/UDP] 
$ns attach-agent $n1 $udp1 

set null31 [new Agent/Null] 
$ns attach-agent $n3 $null31 

$ns connect $udp1 $null31 

set cbr0 [new Application/Traffic/CBR] 
$cbr0 attach-agent $udp0 

$ns at 1.0 "$cbr0 start" 
$ns at 10.0 "$cbr0 stop" 

set cbr1 [new Application/Traffic/CBR] 
$cbr1 attach-agent $udp1 

$ns at 1.0 "$cbr1 start" 
$ns at 10.0 "$cbr1 stop" 

$ns at 11.0 "finish" 

$ns run`,

4: `PROGRAM 4

set ns [new Simulator] 

set tracefile [open lab2.tr w] 
$ns trace-all $tracefile 

set namfile [open lab2.nam w] 
$ns namtrace-all $namfile 

proc finish {} { 

global ns tracefile namfile 

$ns flush-trace 

close $tracefile 
close $namfile 

exec nam lab2.nam & 

exit 0 
} 

set n0 [$ns node] 
set n1 [$ns node] 
set n2 [$ns node] 
set n3 [$ns node] 

$ns duplex-link $n0 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n0 $n2 10 

$ns duplex-link $n1 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n1 $n2 10 

$ns duplex-link $n2 $n3 10.0Mb 1ms DropTail 
$ns queue-limit $n2 $n3 10 

set tcp0 [new Agent/TCP] 
$ns attach-agent $n0 $tcp0 

set sink3 [new Agent/TCP Sink] 
$ns attach-agent $n3 $sink3 

$ns connect $tcp0 $sink3 

set udp1 [new Agent/UDP] 
$ns attach-agent $n1 $udp1 

set null3 [new Agent/Null] 
$ns attach-agent $n3 $null3 

$ns connect $udp1 $null3 

set ftp0 [new Application/FTP] 
$ftp0 attach-agent $tcp0 

$ns at 1.0 "$ftp0 start" 
$ns at 10.0 "$ftp0 stop" 

set cbr1 [new Application/Traffic/CBR] 
$cbr1 attach-agent $udp1 

$ns at 1.0 "$cbr1 start" 
$ns at 10.0 "$cbr1 stop" 

$ns at 11.0 "finish" 

$ns run`,

5: `PROGRAM 5

set ns [new Simulator] 

set tracefile [open 4.tr w] 
$ns trace-all $tracefile 

set namfile [open 4.nam w] 
$ns namtrace-all $namfile 

proc finish {} { 

global ns tracefile namfile 

$ns flush-trace 

close $tracefile 
close $namfile 

exec nam 4.nam & 

exit 0 
} 

set n0 [$ns node] 
set n1 [$ns node] 
set n2 [$ns node] 
set n3 [$ns node] 
set n4 [$ns node] 
set n5 [$ns node] 

$ns duplex-link $n0 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n0 $n2 10 

$ns duplex-link $n1 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n1 $n2 10 

$ns simplex-link $n2 $n3 10.0Mb 1ms DropTail 
$ns queue-limit $n2 $n3 10 

$ns simplex-link $n3 $n2 10.0Mb 1ms DropTail 
$ns queue-limit $n3 $n2 10 

$ns duplex-link-op $n0 $n2 orient right-down 
$ns duplex-link-op $n1 $n2 orient right-up 

$ns simplex-link-op $n2 $n3 orient right 
$ns simplex-link-op $n3 $n2 orient left 

set lan [$ns newLan "$n3 $n4 $n5" 0.5Mb 40ms LL Queue/DropTail MAC/802_3 Channel]

set tcp0 [new Agent/TCP] 
$ns attach-agent $n0 $tcp0 

set sink4 [new Agent/TCP Sink] 
$ns attach-agent $n4 $sink4 

$ns connect $tcp0 $sink4 

$tcp0 set packetSize_ 1500 

set udp1 [new Agent/UDP] 
$ns attach-agent $n1 $udp1 

set null5 [new Agent/Null] 
$ns attach-agent $n5 $null5 

$ns connect $udp1 $null5 

$udp1 set packetSize_ 1500 

set ftp0 [new Application/FTP] 
$ftp0 attach-agent $tcp0 

$ns at 1.0 "$ftp0 start" 
$ns at 10.0 "$ftp0 stop" 

set cbr1 [new Application/Traffic/CBR] 
$cbr1 attach-agent $udp1 

$cbr1 set rate_ 5.0Mb 

$ns at 1.0 "$cbr1 start" 
$ns at 10.0 "$cbr1 stop" 

set myvar [new ErrorModel] 

$myvar set rate_ 0.05 

$myvar ranvar [new RandomVariable/Uniform] 

$myvar drop-target [new Agent/Null] 

$ns lossmodel $myvar $n2 $n3 

$ns at 11.0 "finish" 

$ns run`

};

function showProgram(number){

document.getElementById("output").textContent = programs[number];

}

</script>

</body>
</html>
